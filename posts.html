var coverDataUrl = "";
window.handleCoverUpload = function(input) {
  var file = input.files[0];
  if (!file) return;
  if (file.size > 3 * 1024 * 1024) { alert("圖片不能超過 3MB"); return; }
  var preview = document.getElementById("coverPreview");
  var previewImg = document.getElementById("coverPreviewImg");
  preview.style.display = "block";
  previewImg.src = "";
  previewImg.style.opacity = "0.5";
  
  // Compress and convert to base64
  var canvas = document.createElement("canvas");
  var ctx = canvas.getContext("2d");
  var img = new Image();
  var reader = new FileReader();
  reader.onload = function(e) {
    img.onload = function() {
      var maxW = 600, maxH = 400;
      var w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      if (h > maxH) { w = w * maxH / h; h = maxH; }
      canvas.width = w; canvas.height = h;
      ctx.drawImage(img, 0, 0, w, h);
      coverDataUrl = canvas.toDataURL("image/jpeg", 0.7);
      previewImg.src = coverDataUrl;
      previewImg.style.opacity = "1";
      document.getElementById("artCover").value = "[已上傳]";
      canvas.width = canvas.height = 0;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
window.removeCover = function() {
  coverDataUrl = "";
  document.getElementById("coverPreview").style.display = "none";
  document.getElementById("artCover").value = "";
  document.getElementById("artCoverFile").value = "";
}
window.openArticleForm = function() { document.getElementById("articleModal").classList.add("open"); };
window.closeArticleForm = function() { document.getElementById("articleModal").classList.remove("open"); };
window.publishArticle = function() {
  var title = document.getElementById("artTitle").value.trim();
  var cover = coverDataUrl || document.getElementById("artCover").value.trim();
  var cat = document.getElementById("artCat").value;
  var excerpt = document.getElementById("artExcerpt").value.trim();
  if (!title || !excerpt) return;
  var catMap = { tech:{tag:"💻 技術", cc:"cat-tech", cv:"🚀"}, life:{tag:"🌈 生活", cc:"cat-life", cv:"🧘"}, anime:{tag:"🎬 動漫", cc:"cat-anime", cv:"🌌"}, design:{tag:"🎨 設計", cc:"cat-design", cv:"✨"}, thought:{tag:"💭 隨筆", cc:"cat-thought", cv:"🌿"}, travel:{tag:"✈️ 旅行", cc:"cat-travel", cv:"🗾"} };
  var ci = catMap[cat];
  var now = new Date();
  var ds = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0") + "-" + String(now.getDate()).padStart(2,"0");
  userPosts.unshift({ id: _artId++, title:title, cover:cover || null, excerpt:excerpt, date:ds, cat:cat, tag:ci.tag, cc:ci.cc, cv:ci.cv, rt:"剛剛發布", user:true });
  saveArticles();
  document.getElementById("artTitle").value = "";
  coverDataUrl = "";
  document.getElementById("coverPreview").style.display = "none";
  document.getElementById("artCoverFile").value = "";
  document.getElementById("artCover").value = "";
  document.getElementById("artExcerpt").value = "";
  document.getElementById("artContent").value = "";
  closeArticleForm();
  render();
};
window.deleteArticle = function(id) {
  userPosts = userPosts.filter(function(p) { return p.id !== id; });
  saveArticles();
  render();
};

var searchTerm = "";
window.doSearch = function() {
  searchTerm = document.getElementById("searchInput").value.trim().toLowerCase();
  var btn = document.getElementById("searchClear");
  btn.style.display = searchTerm ? "block" : "none";
  if (searchTerm) { document.querySelectorAll(".tag-btn").forEach(function(t) { t.classList.remove("sel"); }); document.querySelector('.tag-btn[data-tag="all"]').classList.add("sel"); curTag = "all"; }
  render();
}
window.clearSearch = function() { document.getElementById("searchInput").value = ""; doSearch(); }
function render() {
    var f = allPosts().filter(function(p) { return (curTag === "all" || p.cat === curTag) && (!searchTerm || p.title.toLowerCase().indexOf(searchTerm) !== -1 || p.excerpt.toLowerCase().indexOf(searchTerm) !== -1); });
    document.getElementById("postsGrid").innerHTML = f.map(function(p) {
      return '<a href="article.html?id=' + p.id + '" style="text-decoration:none;color:inherit"><div class="card"' + (p.user?' user-article':'') + '><div class="card-cover"' + (p.cover ? ' style="background-image:url(' + p.cover + ');background-size:cover;background-position:center"' : '') + '>' + (p.cover ? '' : p.cv) + '</div><div class="card-body"><div class="card-meta"><span class="card-cat ' + p.cc + '">' + p.tag + '</span><span>\ud83d\udcc5 ' + p.date + '</span></div><div class="card-title">' + p.title + '</div><div class="card-excerpt">' + p.excerpt + '</div><div class="card-footer"><span>' + p.rt + ' 閱讀</span>' + (p.user ? '<button class="pub-art-delete" onclick="event.stopPropagation();event.preventDefault();deleteArticle('+p.id+')" title="刪除"><svg class="ico"><use href="#ico-delete"/></svg></button>' : '') + '<span class="card-more">閱讀更多 <svg class="ico"><use href="#ico-arrow"/></svg></span></div></div></div></a>';
    }).join("");
  }
  document.getElementById("tagFilter").addEventListener("click", function(e) {
    var btn = e.target.closest(".tag-btn");
    if (btn) { document.querySelectorAll(".tag-btn").forEach(function(t) { t.classList.remove("sel"); }); btn.classList.add("sel"); curTag = btn.dataset.tag; render(); }
  });
  render();
});
</script>
