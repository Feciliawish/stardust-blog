{id:1,title:"2024 前端技術趨勢：AI 驅動的新範式",content:"從 Vercel AI SDK 到 WebGPU，AI 深度融入了開發流程。聊聊最近半年踩過的坑與收穫。\n\n## AI 驅動開發\n\n這一年最大的變化無疑是 AI。GitHub Copilot 已經從「偶爾有用」變成「日常必備」。Cursor 更進一步，把整個 IDE 變成了一個對話界面。\n\n## WebGPU 來了\n\nChrome 113 正式啟用 WebGPU，瀏覽器端高效能計算不再是一個夢想。我們測試了幾個場景：\n\n- 圖片處理比 WebGL 快 3-5 倍\n- 機器學習推理可以完全在瀏覽器端進行\n- 遊戲渲染的幀率提升明顯\n\n## 框架之爭\n\nReact Server Components 穩定後，整個生態在重構。Next.js App Router、Remix、Astro...選擇比以往更多。我的建議是：不要追新，選最適合團隊的。\n\n> 「工具是手段，產品才是目的。」\n\n## 總結\n\n2024 是充滿變化的一年，但核心能力永遠不變：思考、設計、解決問題。",excerpt:"從 Vercel AI SDK 到 WebGPU，AI 深度融入了開發流程。聊聊最近半年踩過的坑與收穫。",date:"2024-12-18",cat:"tech",tag:"💻 技術",cc:"cat-tech",cv:"🚀",rt:"8 min"},
{id:2,title:"CSS 動畫魔法：讓人驚豔的關鍵幀",content:"@keyframes、cubic-bezier、will-change... 讓頁面從「能用」變成「驚豔」。\n\n## 基礎動畫\n\n```css\n@keyframes fadeIn {\n  from { opacity: 0; transform: translateY(20px); }\n  to   { opacity: 1; transform: translateY(0); }\n}\n```\n\n## 進階技巧\n\n使用 cubic-bezier 可以創造出自然的緩動效果。我最常用的幾個：\n\n- `cubic-bezier(0.22, 0.61, 0.36, 1)` - 自然的彈出\n- `cubic-bezier(0.4, 0, 0.2, 1)` - Material Design 標準\n\n## 效能優化\n\n- 只用 `transform` 和 `opacity` 做動畫\n- 永遠記得加 `will-change` 提示瀏覽器\n- 避免在動畫中改變 layout 屬性",excerpt:"@keyframes、cubic-bezier、will-change... 讓頁面從「能用」變成「驚豔」。",date:"2024-12-10",cat:"design",tag:"🎨 設計",cc:"cat-design",cv:"✨",rt:"6 min"},
{id:3,title:"東京漫步：涉谷到鎌倉七日記",content:"沒有計劃就是最好的計劃。在東京街頭隨意漫步，吃到了最好吃的拉麵。\n\n## Day 1-2: 涉谷 & 原宿\n\n落地後直接去了涉谷。那個十字路口真的和電影裡一樣震撼。原宿的竹下通讓錢包哭泣。\n\n## Day 3-4: 鎌倉\n\n搭江之電去鎌倉。高校前站的那個平交道，灌籃高手的經典場景。海風吹得很舒服。\n\n## Day 5-7: 秋葉原 & 淺草\n\n秋葉原的電器街和動漫店逛了一整天。淺草的雷門和仲見世通充滿了江戶風情。\n\n> 旅行最大的收穫不是去了哪裡，而是回來之後看世界的角度不同了。",excerpt:"沒有計劃就是最好的計劃。在東京街頭隨意漫步，吃到了最好吃的拉麵。",date:"2024-11-25",cat:"travel",tag:"✈️ 旅行",cc:"cat-travel",cv:"🗾",rt:"12 min"},
{id:4,title:"四月新番必追：這季 5 部推薦",content:"從治癒日常到硬核科幻，四月新番質量意外地高。個人強烈推薦的五部。\n\n## 1. 椎名林檎\n\n原創動畫，作畫精美到每一幀都可以截圖當桌布。音樂由梶浦由記操刀，絕了。\n\n## 2. 星辰坠落\n\n科幻題材，世界觀設定很紮實。前三集的節奏把握得很好。\n\n## 3-5. 其他推薦\n\n還有幾部日常番和戀愛喜劇也不錯，週末一口氣補完很過癮。",excerpt:"從治癒日常到硬核科幻，四月新番質量意外地高。個人強烈推薦的五部。",date:"2024-11-18",cat:"anime",tag:"🎬 動漫",cc:"cat-anime",cv:"🌌",rt:"5 min"},
{id:5,title:"Vim 配置進化史：從新手到熟練",content:"四年前打開 Vim 不知道怎麼退出，現在它已是唯一的編輯器。分享配置心得。\n\n## 起步\n\n```vim\n\" 關掉方向鍵，強迫自己用 hjkl\nnoremap <Up> <Nop>\nnoremap <Down> <Nop>\nnoremap <Left> <Nop>\nnoremap <Right> <Nop>\n```\n\n## 插件生態\n\n從 vim-plug 到 lazy.nvim，插件管理越來越方便。必裝的幾個：\n\n- Telescope - 模糊搜尋\n- Treesitter - 語法高亮\n- LSP - 程式補全\n- Harpoon - 快速跳轉\n\n## 效率提升\n\n熟練之後，編輯速度確實比滑鼠快很多。但最重要的是：不用離開鍵盤的沉浸感。",excerpt:"四年前打開 Vim 不知道怎麼退出，現在它已是唯一的編輯器。分享配置心得。",date:"2024-11-15",cat:"tech",tag:"💻 技術",cc:"cat-tech",cv:"⌨️",rt:"10 min"},
{id:6,title:"關於焦慮和自我接納的碎碎念",content:"二十五歲之後發現，成長不是變得更厲害，而是更接納自己的不完美。\n\n## 焦慮的來源\n\n社群媒體讓我們看到太多「別人的成功」。但每個人都有自己的節奏。\n\n## 接納不完美\n\n承認自己做不到，反而是一種力量。不需要每次都做到最好。\n\n> 完美是完成的敵人。\n\n## 一些小建議\n\n1. 每天寫下三件感恩的事\n2. 減少社交媒體使用時間\n3. 適度運動，哪怕是散步\n4. 允許自己有「什麼都不想做」的日子",excerpt:"二十五歲之後發現，成長不是變得更厲害，而是更接納自己的不完美。",date:"2024-11-02",cat:"thought",tag:"💭 隨筆",cc:"cat-thought",cv:"🌿",rt:"4 min"},
{id:7,title:"程序員養生指南：腰椎康復之路",content:"久坐是慢性自殺。三個月康復訓練後，總結了適合程序員的日常養生清單。\n\n## 問題診斷\n\n腰 L4-L5 椎間盤突出，坐超過一小時就痛。醫生說：再不注意就要手術了。\n\n## 康復計劃\n\n### 每日必做\n\n1. 貓牛式 - 10 次\n2. 鳥狗式 - 每邊 30 秒\n3. 橋式 - 15 次\n4. 死蟲式 - 20 次\n\n### 工作習慣\n\n- 番茄鐘：25 分鐘工作 + 5 分鐘伸展\n- 升降桌：站坐交替\n- 螢幕高度：視線平行於螢幕上緣\n\n## 三個月後\n\n痛感從 8 分降到 2 分。最重要的是養成了習慣。程式碼可以重寫，身體只有一個。",excerpt:"久坐是慢性自殺。三個月康復訓練後，總結了適合程序員的日常養生清單。",date:"2024-10-20",cat:"life",tag:"🌈 生活",cc:"cat-life",cv:"🧘",rt:"7 min"},
{id:8,title:"搭建動漫追番管理系統",content:"用 Notion + API 做了追番管理，自動抓取新番信息記錄觀看進度。\n\n## 架構\n\n- Notion 作為數據庫\n- Python 腳本定時抓取番劇信息\n- GitHub Actions 自動運行\n\n## 功能\n\n- 自動標記更新日期\n- 觀看進度追蹤\n- 評分系統\n- 推薦算法\n\n有興趣的話可以去 GitHub 看源碼。",excerpt:"用 Notion + API 做了追番管理，自動抓取新番信息記錄觀看進度。",date:"2024-10-08",cat:"anime",tag:"🎬 動漫",cc:"cat-anime",cv:"📺",rt:"6 min"}
  ];

<div class="article-header">' +
