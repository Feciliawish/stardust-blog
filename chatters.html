<style>
.publish-box{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:24px;backdrop-filter:blur(16px);margin-bottom:24px;max-width:700px;margin-left:auto;margin-right:auto}
.publish-box textarea{width:100%;min-height:80px;padding:14px 18px;border-radius:var(--r2);border:1px solid var(--bdr);background:var(--surf-h);color:var(--text);font-family:inherit;font-size:0.9em;resize:vertical;outline:none;transition:all var(--t);margin-bottom:12px}
.publish-box textarea:focus{border-color:var(--c1);box-shadow:0 0 0 3px rgba(124,58,237,0.1)}
.pub-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.pub-cats{display:flex;gap:6px;flex-wrap:wrap}
.pub-cat{padding:6px 16px;border-radius:16px;border:1px solid var(--bdr);background:var(--surf);color:var(--text2);font-size:0.8em;cursor:pointer;font-family:inherit;transition:all var(--t);display:flex;align-items:center;gap:5px}
.pub-cat:hover,.pub-cat.sel{background:linear-gradient(135deg,var(--c1),var(--c2));border-color:transparent;color:#fff}
.pub-btn{padding:10px 28px;border-radius:20px;border:none;background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;font-family:inherit;font-size:0.88em;font-weight:600;cursor:pointer;transition:all var(--t);margin-left:auto;box-shadow:0 4px 16px rgba(124,58,237,0.25);display:flex;align-items:center;gap:6px}
.pub-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(124,58,237,0.4)}
.pub-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.del-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:0.9em;padding:4px 8px;border-radius:8px;transition:all var(--t);opacity:0;margin-left:auto;display:flex;align-items:center}
.chat-item:hover .del-btn{opacity:1}
.del-btn:hover{color:#f87171;background:rgba(248,113,113,0.1)}
</style>
<h1 class="page-title"><svg class="ico"><use href="#ico-chat"/></svg>說說</h1>
<div class="publish-box">
  <textarea id="chatterInput" placeholder='分享此刻的想法...' maxlength="200"></textarea>
  <div class="pub-row">
    <div class="pub-cats" id="pubCats">
      <button class="pub-cat sel" data-tag="\ud83d\udcac"><svg class="ico"><use href="#ico-chat"/></svg>日常</button>
      <button class="pub-cat" data-tag="\ud83d\udcbb"><svg class="ico"><use href="#ico-code"/></svg>技術</button>
      <button class="pub-cat" data-tag="\ud83c\udfac"><svg class="ico"><use href="#ico-film"/></svg>動漫</button>
      <button class="pub-cat" data-tag="\ud83c\udfb5"><svg class="ico"><use href="#ico-music"/></svg>音樂</button>
      <button class="pub-cat" data-tag="\ud83d\udcd6"><svg class="ico"><use href="#ico-book"/></svg>閱讀</button>
      <button class="pub-cat" data-tag="\ud83c\udf5c"><svg class="ico"><use href="#ico-eat"/></svg>美食</button>
      <button class="pub-cat" data-tag="\u2708\ufe0f"><svg class="ico"><use href="#ico-flight"/></svg>旅行</button>
    </div>
    <span style="font-size:0.74em;color:var(--text2)" id="charCount">0/200</span>
    <button class="pub-btn" id="pubBtn" disabled><svg class="ico"><use href="#ico-send"/></svg>發表</button>
  </div>
</div>
<div style="display:flex;flex-direction:column;gap:10px;max-width:700px;margin:0 auto 40px" id="chattersList"></div>

</div>
<script src="app.js"></script>
<script>
(function() {
  var stored = localStorage.getItem("ff_chats");
  var chatters = stored ? JSON.parse(stored) : [
    { name:'星塵', av:'\ud83c\udf0c', text:'優化了部落格的回應式佈局，手機端體驗大幅提升 \u2728', tag:'\ud83d\udcbb', time:'2 天前' },
    { name:'星塵', av:'\ud83c\udfb8', text:'新番《椎名林檎》意外好看，作畫和配樂絕了', tag:'\ud83c\udfac', time:'5 天前' },
    { name:'星塵', av:'\ud83d\udcbb', text:'GitHub Actions 自動化部署踩坑，折騰了一下午', tag:'\ud83d\udcbb', time:'1 週前' },
    { name:'星塵', av:'\ud83d\udda5', text:'換了新顯示器，4K 144Hz，寫代碼像在看藝術品 \ud83d\ude2d', tag:'\ud83d\udcbb', time:'2 週前' },
    { name:'星塵', av:'\ud83d\udecd', text:'週末去秋葉原搬回一堆手辦，錢包在哭泣', tag:'\ud83c\udf5c', time:'3 週前' }
  ];
  var pubTag = "\ud83d\udcac";

  function save() { 
    try { localStorage.setItem("ff_chats", JSON.stringify(chatters)); } catch(e) {} 
  }
  function render() {
    var list = document.getElementById("chattersList");
    if (!list) return;
    list.innerHTML = chatters.map(function(c, i) {
      return '<div class="chat-item"><div class="chat-av">' + c.av + '</div><div style="flex:1"><div class="chat-name">' + c.name + ' <span style="font-size:0.72em;color:var(--c1)">' + c.tag + '</span></div><div class="chat-text">' + c.text + '</div><div class="chat-time">' + c.time + '</div></div><button class="del-btn" onclick="rm(' + i + ')" title="刪除"><svg class="ico"><use href="#ico-delete"/></svg></button></div>';
    }).join("");
  }
  
  window.rm = function(i) { chatters.splice(i, 1); save(); render(); };
  
  var catsEl = document.getElementById("pubCats");
  if (catsEl) {
    catsEl.addEventListener("click", function(e) {
      var btn = e.target.closest(".pub-cat");
      if (btn) { 
        document.querySelectorAll(".pub-cat").forEach(function(b) { b.classList.remove("sel"); }); 
        btn.classList.add("sel"); 
        pubTag = btn.dataset.tag; 
      }
    });
  }
  
  var input = document.getElementById("chatterInput");
  var count = document.getElementById("charCount");
  var btn = document.getElementById("pubBtn");
  
  if (input && btn && count) {
    input.addEventListener("input", function() { 
      var len = input.value.trim().length; 
      count.textContent = len + "/200"; 
      btn.disabled = len === 0; 
    });
    
    btn.addEventListener("click", function() {
      var text = input.value.trim(); 
      if (!text) return;
      chatters.unshift({ name:'星塵', av:pubTag, text:text, tag:pubTag, time:'剛剛' });
      input.value = ""; 
      count.textContent = "0/200"; 
      btn.disabled = true;
      save(); 
      render();
    });
    
    input.addEventListener("keydown", function(e) { 
      if (e.key === "Enter" && !e.shiftKey) { 
        e.preventDefault(); 
        if (!btn.disabled) btn.click(); 
      } 
    });
  }
  
  render();
})();
</script>
